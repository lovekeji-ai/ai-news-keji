setup:
  initialized: false
  init_schema_version: 1
  guided_setup_completed: false
  selected_external_skills: []
  newsletter_choice: later
  preferences_configured: false
  steps:
    external_skills_prompted: false
    newsletter_prompted: false
    output_dir_selected: false
    preferences_prompted: false

# ai-news-keji 公开配置模板。
# 运行 scripts/init.py 创建已初始化的本地 config.yaml。

paths:
  # 原始日报和摘要日报会写入这个目录。
  output_dir: ~/ai-news-keji/output

  # 可选的本地评分规则和个人兴趣画像。
  # 如果这个路径缺失，skill 会回退到 references/filter-rules.example.md。
  filter_rules: ~/ai-news-keji/filter-rules.md

  # 建议放在 skill 目录之外，因为原始缓存可能包含私人邮件内容。
  cache_dir: ~/.cache/ai-news-keji

settings:
  # yesterday / today
  default_date: yesterday
  timezone: Asia/Shanghai
  retention_days: 10
  dedup_window_days: 7
  continuation_penalty: 2

pipeline:
  # 只启用你已经配置好的来源组。
  enabled_sources:
    - rss
    - websites
    # - email
  skip_unavailable_sources: true

email:
  # none / imap / mcp
  # 使用 imap 可以连接标准邮箱，不需要 Gmail MCP。
  # 机密信息只放在环境变量里，不要写进这个 YAML 文件。
  mode: none
  imap:
    host: imap.gmail.com
    port: 993
    ssl: true
    folder: INBOX
    username_env: AI_NEWS_IMAP_USERNAME
    password_env: AI_NEWS_IMAP_PASSWORD
    max_body_chars: 20000

external_skills:
  # scripts/init.py 会把原始仓库安装到这里，并把选择的 skills 软链到 link_targets。
  install_dir: ~/.local/share/ai-news-keji/external-skills
  link_targets:
    - ~/.claude/skills

  follow-builders:
    enabled: false
    install_kind: git-node-skill
    repo: https://github.com/zarazhangrui/follow-builders.git
    install_path: ~/.local/share/ai-news-keji/external-skills/follow-builders
    link_name: follow-builders
    command: cd ~/.local/share/ai-news-keji/external-skills/follow-builders/scripts && node prepare-digest.js 2>/dev/null

  bestblogs:
    enabled: false
    install_kind: npm-cli
    repo: https://github.com/ginobefun/bestblogs
    command: bestblogs discover today --limit 20 --json 2>/dev/null

  ak-rss-digest:
    enabled: false
    install_kind: git-subskill
    repo: https://github.com/rookie-ricardo/erduo-skills.git
    install_path: ~/.local/share/ai-news-keji/external-skills/ak-rss-digest
    source_path: ~/.local/share/ai-news-keji/external-skills/erduo-skills/skills/ak-rss-digest
    repo_path: ~/.local/share/ai-news-keji/external-skills/erduo-skills
    link_name: ak-rss-digest
    command: cd ~/.local/share/ai-news-keji/external-skills/erduo-skills && python3 skills/ak-rss-digest/scripts/fetch_today_feed_items.py --days 1 --timezone Asia/Shanghai --format json 2>/dev/null

notification:
  # none / macos
  method: none
